name: world-forge-prod

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${WORLD_FORGE_DB_NAME:-world_forge}
      POSTGRES_USER: ${WORLD_FORGE_DB_USER:?WORLD_FORGE_DB_USER is required}
      POSTGRES_PASSWORD: ${WORLD_FORGE_DB_PASSWORD:?WORLD_FORGE_DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - private
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    restart: unless-stopped
    environment:
      cluster.name: world-forge
      discovery.type: single-node
      xpack.security.enabled: "false"
      bootstrap.memory_lock: "true"
      ES_JAVA_OPTS: ${WORLD_FORGE_ELASTICSEARCH_JAVA_OPTS:--Xms1g -Xmx1g}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - private
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=1s || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  api:
    image: ${WORLD_FORGE_API_IMAGE:-world-forge-api:prod}
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-production}
      SERVER_PORT: ${SERVER_PORT:-8080}
      WORLD_FORGE_DB_URL: ${WORLD_FORGE_DB_URL:-jdbc:postgresql://postgres:5432/world_forge}
      WORLD_FORGE_DB_USER: ${WORLD_FORGE_DB_USER:?WORLD_FORGE_DB_USER is required}
      WORLD_FORGE_DB_PASSWORD: ${WORLD_FORGE_DB_PASSWORD:?WORLD_FORGE_DB_PASSWORD is required}
      WORLD_FORGE_JPA_DDL_AUTO: ${WORLD_FORGE_JPA_DDL_AUTO:-validate}
      WORLD_FORGE_FLYWAY_ENABLED: ${WORLD_FORGE_FLYWAY_ENABLED:-true}
      WORLD_FORGE_ELASTICSEARCH_URL: ${WORLD_FORGE_ELASTICSEARCH_URL:-http://elasticsearch:9200}
      WORLD_FORGE_SEARCH_ENABLED: ${WORLD_FORGE_SEARCH_ENABLED:-true}
      WORLD_FORGE_SEARCH_INDEX_NAME: ${WORLD_FORGE_SEARCH_INDEX_NAME:-world_forge_maps}
      WORLD_FORGE_ADMIN_ENABLED: ${WORLD_FORGE_ADMIN_ENABLED:-false}
      WORLD_FORGE_ADMIN_TOKEN: ${WORLD_FORGE_ADMIN_TOKEN:-}
      WORLD_FORGE_JWT_SECRET: ${WORLD_FORGE_JWT_SECRET:?WORLD_FORGE_JWT_SECRET is required}
      WORLD_FORGE_JWT_ISSUER: ${WORLD_FORGE_JWT_ISSUER:-world-forge-api}
      WORLD_FORGE_JWT_TTL_SECONDS: ${WORLD_FORGE_JWT_TTL_SECONDS:-3600}
      WORLD_FORGE_CORS_ALLOWED_ORIGINS: ${WORLD_FORGE_CORS_ALLOWED_ORIGINS:-}
    ports:
      - "${WORLD_FORGE_API_HOST_PORT:-8081}:${SERVER_PORT:-8080}"
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - public
      - private
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:$${SERVER_PORT:-8080}/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  web:
    image: ${WORLD_FORGE_WEB_IMAGE:-world-forge-web:prod}
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:?VITE_API_BASE_URL is required for production compose}
    restart: unless-stopped
    ports:
      - "${VITE_WEB_PORT:-8080}:8080"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - public
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

networks:
  public:
  private:
    internal: true

volumes:
  postgres_data:
  elasticsearch_data:

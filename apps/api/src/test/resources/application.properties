spring.datasource.url=jdbc:h2:mem:worldforge;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.flyway.enabled=false

world-forge.search.enabled=false
world-forge.admin.token=test-admin-token
world-forge.auth.jwt-secret=test-jwt-secret-change-me-32-byte-min
world-forge.auth.jwt-issuer=world-forge-api-test
world-forge.auth.access-token-ttl-seconds=3600

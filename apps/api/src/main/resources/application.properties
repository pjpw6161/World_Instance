spring.application.name=api

spring.datasource.url=${WORLD_FORGE_DB_URL:jdbc:postgresql://localhost:5432/world_forge}
spring.datasource.username=${WORLD_FORGE_DB_USER:world_forge}
spring.datasource.password=${WORLD_FORGE_DB_PASSWORD:world_forge_dev}

spring.jpa.hibernate.ddl-auto=${WORLD_FORGE_JPA_DDL_AUTO:validate}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.enabled=${WORLD_FORGE_FLYWAY_ENABLED:true}

world-forge.elasticsearch.url=${WORLD_FORGE_ELASTICSEARCH_URL:http://localhost:9200}
world-forge.search.enabled=${WORLD_FORGE_SEARCH_ENABLED:true}
world-forge.search.index-name=${WORLD_FORGE_SEARCH_INDEX_NAME:world_forge_maps}
world-forge.admin.enabled=${WORLD_FORGE_ADMIN_ENABLED:false}
world-forge.admin.token=${WORLD_FORGE_ADMIN_TOKEN:}
world-forge.auth.jwt-secret=${WORLD_FORGE_JWT_SECRET:local-dev-change-me-32-byte-secret}
world-forge.auth.jwt-issuer=${WORLD_FORGE_JWT_ISSUER:world-forge-api}
world-forge.auth.access-token-ttl-seconds=${WORLD_FORGE_JWT_TTL_SECONDS:3600}
world-forge.cors.allowed-origins=${WORLD_FORGE_CORS_ALLOWED_ORIGINS:}
